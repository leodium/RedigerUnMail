<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Game - École</title>

<style>

:root{
--bg:#f3f8ff;
--primary:#4fa3ff;
--primary-dark:#2f7fd8;
--border:#cfe3ff;
--success:#2ecc71;
--shadow:0 8px 24px rgba(0,0,0,0.08);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:#1f2d3d;
}

/* HEADER */
.missions{
background:#d9ecff;
padding:10px 14px;
border-bottom:3px solid var(--primary);
}

#missionTitle{margin:0;}
#activeMission{margin-top:6px;font-weight:bold;color:var(--primary-dark);}

#missionBox{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:8px;
margin-top:10px;
}

.mission{
background:#fff;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.mission:hover{transform:translateY(-2px);}

.mission.active{
background:#b7e4c7;
border:2px solid #74c69d;
}

.mission.done{
border:2px solid var(--success);
}

/* LAYOUT */
.container{display:flex;}
.main{flex:1;padding:16px;}
.debug{width:300px;background:#fff;padding:16px;border-left:3px solid var(--primary);}

/* FORM */
.card{
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:var(--shadow);
}

label{display:block;margin-top:10px;font-weight:bold;}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid var(--border);
}

textarea{min-height:160px;}

button{
margin-top:10px;
padding:12px;
background:var(--primary);
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{background:var(--primary-dark);}

#status{margin-top:10px;font-weight:bold;}

/* HELP */
.help{
font-size:0.85rem;
color:#666;
margin-top:6px;
line-height:1.3;
}

/* INBOX */
.inbox-toggle{
position:fixed;
top:120px;
right:15px;
background:var(--primary);
color:#fff;
padding:12px 16px;
border-radius:999px;
border:none;
cursor:pointer;
box-shadow:var(--shadow);
}

.inbox-panel{
position:fixed;
top:0;
right:-420px;
width:380px;
height:100%;
background:#fff;
transition:0.3s;
box-shadow:-8px 0 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
z-index:30;
}

.inbox-panel.open{right:0;}

.inbox-header{
display:flex;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #eee;
}

.inbox-content{
padding:12px;
overflow:auto;
flex:1;
}

.mail{
border-bottom:1px solid #eee;
padding:10px 0;
}

@keyframes pop{
0%{transform:scale(0.9);opacity:0;}
50%{transform:scale(1.05);opacity:1;}
100%{transform:scale(1);}
}

.mail.pop{animation:pop 0.3s ease;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.25);
opacity:0;
pointer-events:none;
transition:0.2s;
}

.overlay.open{
opacity:1;
pointer-events:auto;
}

.footer{
margin-top:10px;
font-size:0.75rem;
color:#888;
}

</style>
</head>

<body>

<div class="missions">
<h3 id="missionTitle">🎯 Mission du jour : écrire un message simple sur ...</h3>
<div id="activeMission">Mission actuelle : -</div>
<div id="missionBox"></div>
</div>

<button class="inbox-toggle" onclick="openInbox()">📥 Réception</button>

<div id="overlay" class="overlay" onclick="closeInbox()"></div>

<aside id="inboxPanel" class="inbox-panel">

<div class="inbox-header">
<h3>📥 Réception</h3>
<button onclick="closeInbox()">✕</button>
</div>

<div id="inbox" class="inbox-content">Aucun message.</div>

</aside>

<div class="container">

<div class="main">

<div class="card">

<h3>✉️ Écrire un message</h3>

<label>Email</label>
<input id="email">

<label>Objet</label>
<input id="objet">
<div id="objectHelp" class="help"></div>

<label>Message</label>
<textarea id="message"></textarea>
<div id="messageHelp" class="help"></div>

<button onclick="send()">Envoyer</button>

<div id="status"></div>

<div class="footer">Créé par Leodium</div>

</div>

</div>

<div class="debug">
<h3>Analyse</h3>
<div id="debugBox">-</div>
</div>

</div>

<script>

/* =========================
   THÈMES (VOCABULAIRE ENRICHI)
========================= */

const missionsData=[
{ text:"fruit", value:["pomme","banane","orange","fraise","kiwi","raisin","mangue","poire","pêche","abricot","cerise"] },

{ text:"animal", value:["chien","chat","lapin","cheval","lion","tigre","ours","zèbre","éléphant","crocodile","hibou","renard"] },

{ text:"couleur", value:["rouge","bleu","vert","jaune","noir","blanc","rose","violet","turquoise","orange","beige","gris"] },

{ text:"action", value:["lire","écrire","dessiner","jouer","courir","chanter","marcher","sauter","observer","écouter","apprendre"] },

{ text:"objet", value:["stylo","cahier","gomme","livre","table","chaise","crayon","règle","ordinateur","ardoise","trousse"] },

{ text:"nourriture", value:["pizza","pain","lait","fromage","pâtes","riz","gâteau","chocolat","soupe","salade","yaourt"] },

{ text:"lieu", value:["école","maison","parc","classe","ville","jardin","plage","forêt","bibliothèque","musée","terrain"] },

{ text:"emotion", value:["joie","tristesse","colère","peur","surprise","calme","amour","fatigue","fierté","ennui","stress"] },

{ text:"meteo", value:["soleil","pluie","vent","neige","orage","nuage","brouillard","chaleur","froid","tempête"] }
];

const people=[
{name:"Emma",avatar:"E",color:"#4fa3ff"},
{name:"Lucas",avatar:"L",color:"#6c8cff"},
{name:"Lina",avatar:"L",color:"#ff6fa8"},
{name:"Noah",avatar:"N",color:"#00b894"}
];

const domains=["ecole.be","classe.be","cour.be","bureau.be"];

const replyBank={
fruit:["🍎 Merci pour ce fruit !","J’adore les fruits 😋","Bonne idée !"],
animal:["🐾 Très bel animal !","J’aime les animaux 🐶","Super choix !"],
couleur:["🎨 Jolie couleur !","Très bon goût 😊","Magnifique !"],
action:["👏 Bravo !","Bonne action 👍","Super idée !"],
objet:["📚 Bon choix d’objet scolaire !","Très utile 👍","Parfait pour l’école !"],
nourriture:["🍕 Miam !","Très bon choix 😋","J’ai faim maintenant !"],
lieu:["📍 Joli lieu !","Super endroit 👍","Intéressant !"],
emotion:["😊 Merci pour cette émotion !","Je comprends 👍","Très expressif !"],
meteo:["🌤️ Bonne météo !","J’aime ce temps 👍","Intéressant !"]
};

let missions=[];
let inbox=[];
let currentMission=null;

/* EMAIL */
function randomEmail(p){
const slug=p.name.toLowerCase();
return slug+Math.floor(Math.random()*99)+"@"+domains[Math.floor(Math.random()*domains.length)];
}

function isValidEmail(e){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

/* INIT */
function load(){

missions=[...missionsData]
.sort(()=>Math.random()-0.5)
.slice(0,4)
.map(m=>{
const p=people[Math.floor(Math.random()*people.length)];
return {...m,person:p,email:randomEmail(p),done:false};
});

selectMission(missions[0].text);
render();
}

function render(){
document.getElementById("missionBox").innerHTML =
missions.map(m=>`
<div class="mission ${m===currentMission?'active':''} ${m.done?'done':''}"
onclick="selectMission('${m.text}')">
${m.done?'✔':'🎯'} ${m.text}<br>
👤 ${m.person.name}<br>
📧 <small>${m.person.name}@${domains[0]}</small>
</div>
`).join("");
}

function selectMission(text){

currentMission=missions.find(m=>m.text===text);

document.getElementById("email").value="";
document.getElementById("objet").value="";
document.getElementById("message").value="";
document.getElementById("status").textContent="";
document.getElementById("debugBox").textContent="-";
document.getElementById("objectHelp").textContent="";
document.getElementById("messageHelp").textContent="";

document.getElementById("activeMission").textContent="Mission actuelle : "+text;
document.getElementById("missionTitle").textContent="🎯 Mission du jour : écrire un message simple sur "+text;

document.getElementById("objectHelp").textContent="💡 Objet = mot exact : "+currentMission.text;
document.getElementById("messageHelp").textContent="✏️ Mots possibles : "+currentMission.value.join(", ");

render();
}

function analyzeMessage(msg){
if(!/[.!?]/.test(msg))
return {ok:false,reason:"❌ Mets un point"};

const t=msg.toLowerCase();
const ok=currentMission.value.some(w=>t.includes(w));

return ok?{ok:true}:{ok:false,reason:"❌ Mot manquant"};
}

function openInbox(){
document.getElementById("inboxPanel").classList.add("open");
document.getElementById("overlay").classList.add("open");
}

function closeInbox(){
document.getElementById("inboxPanel").classList.remove("open");
document.getElementById("overlay").classList.remove("open");
}

function updateInbox(){
document.getElementById("inbox").innerHTML =
inbox.length?
inbox.map((m,i)=>`
<div class="mail ${i===0?'pop':''}">
<b>${m.from}</b><br>
📌 ${m.objet}<br>
${m.message}
</div>`).join("")
:"Aucun message.";
}

function send(){

const email=document.getElementById("email").value.trim();
const objet=document.getElementById("objet").value.trim();
const msg=document.getElementById("message").value.trim();
const status=document.getElementById("status");

if(!email||!objet||!msg){status.textContent="❌ champs manquants";return;}
if(!isValidEmail(email)){status.textContent="❌ email invalide";return;}

if(objet.trim().toLowerCase()!==currentMission.text){
document.getElementById("objectHelp").textContent="⚠️ Objet exact : "+currentMission.text;
status.textContent="❌ objet incorrect";
return;
}

const res=analyzeMessage(msg);
document.getElementById("debugBox").textContent=res.reason;

if(!res.ok){
status.textContent=res.reason;
document.getElementById("messageHelp").textContent="💡 Mots possibles : "+currentMission.value.join(", ");
return;
}

if(email!==currentMission.email){
status.textContent="❌ email incorrect";
return;
}

currentMission.done=true;
render();

const replies=replyBank[currentMission.text];
const reply=replies[Math.floor(Math.random()*replies.length)];

inbox.unshift({
from:currentMission.person.name,
objet:objet,
message:reply
});

updateInbox();
openInbox();

status.textContent="✔ Message envoyé";
}

load();
updateInbox();

</script>

</body>
</html>
